name: Docker Build & Push

on:
  push:
    tags:
      - "*"

permissions:
  packages: write
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # -------------------------
      # 1. Docker setup
      # -------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Docker Hub login
      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # GHCR login
      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------
      # 2. Tag logic
      # -------------------------
      - name: Set Tag env
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          DOCKERHUB_IMAGE=starstreammm/txt_cleanto_epub
          GHCR_IMAGE=ghcr.io/xu-xihe/txt_cleanto_epub

          TAGS="$DOCKERHUB_IMAGE:$TAG,$GHCR_IMAGE:$TAG"

          if [[ "$TAG" =~ -(rc|beta|alpha|dev) ]]; then
            echo "Pre-release detected, not updating latest tag"
          else
            TAGS="$TAGS,$DOCKERHUB_IMAGE:latest,$GHCR_IMAGE:latest"
          fi

          echo "TAGS=$TAGS" >> $GITHUB_ENV

      # -------------------------
      # 3. Build & Push
      # -------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.TAGS }}